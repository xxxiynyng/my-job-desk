<!DOCTYPE html>
<!--
  ═══════════════════════════════════════════════════════════════
  Pickd 베타 랜딩페이지
  ✏️ 문구 수정   → <script> 최상단 COPY 객체에서 문자열만 바꾸세요
  🎨 디자인 수정 → <style> 최상단 :root CSS 변수만 바꾸세요
  🔀 켜고 끄기   → CONFIG 객체 (설문 표시, 모바일 CTA 바, 폼 전송 주소 등)
  ═══════════════════════════════════════════════════════════════
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pickd — 지원할수록 가벼워지는 취업 준비</title>
<meta name="description" content="부울경 취준생을 위한 AI 취업 매니지먼트. 내 경험은 그대로, 강조할 내용은 기관에 맞게. 무료 베타 사전 신청.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
/* ═══════════════ 디자인 토큰 — 여기서만 수정 ═══════════════ */
:root{
  /* Base */
  --bg-white:#FFFFFF;
  --bg-tint:#F4F8FE;
  /* 1) 라이트 미스틱 블루 */
  --blue-100:#DCE9FF;
  --blue-300:#A9C9FF;
  --blue-500:#7DA7F4;
  --blue-600:#5B8DEF; /* 텍스트용 진한 블루(대비 확보) */
  /* 2) 민트 → 그린 */
  --mint-200:#CFF5EA;
  --mint-400:#A8EBD9;
  --green-500:#34C48E;
  /* 3) 레몬 — 포인트 (전체의 5% 이하) */
  --lemon-400:#FFE27A;
  --lemon-500:#FFD84D;
  /* Text */
  --ink-900:#1E2A3B;
  --ink-600:#5B6B80;
  --ink-400:#93A1B5;
  /* Gradients */
  --grad-sky:linear-gradient(160deg,#DCE9FF 0%,#A9C9FF 45%,#A8EBD9 100%);
  --grad-sky-soft:linear-gradient(180deg,#E9F1FF 0%,#F4F8FE 60%,#EAF9F3 100%);
  --grad-solution:linear-gradient(160deg,#EAF9F3 0%,#E4EEFF 100%);
  --grad-text:linear-gradient(90deg,#5B8DEF,#34C48E);
  /* Spacing (8px 베이스) */
  --space-2:8px; --space-3:12px; --space-4:16px; --space-5:20px; --space-6:24px;
  --space-8:32px; --space-12:48px; --space-16:64px; --space-20:80px;
  --section-y:128px; --container:1120px;
  /* Radius */
  --r-sm:12px; --r-md:20px; --r-lg:28px; --r-pill:999px;
  /* Shadow */
  --shadow-sm:0 4px 16px rgba(90,141,239,.10);
  --shadow-md:0 12px 40px rgba(90,141,239,.14);
  --shadow-lg:0 24px 60px rgba(90,141,239,.18);
  /* Glass blur */
  --blur-chip:12px; --blur-card:24px; --blur-panel:30px;
  /* Type scale */
  --font-h1:56px; --font-h2:40px; --font-h3:22px; --font-body:17px;
  --font-caption:13px;
  /* Form */
  --input-border:#E2E9F4;
  --cta-h:52px;
}
@media (max-width:767px){
  :root{
    --font-h1:34px; --font-h2:28px; --font-h3:20px; --font-body:16px;
    --section-y:72px;
  }
}

/* ═══════════════ 베이스 ═══════════════ */
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Pretendard',-apple-system,sans-serif;
  color:var(--ink-900);
  background:var(--bg-white);
  font-size:var(--font-body);
  line-height:1.7;
  letter-spacing:-0.01em;
  word-break:keep-all; /* 한국어 단어 중간 줄바꿈 방지 */
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
img,svg{display:block;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input{font-family:inherit;}
:focus-visible{outline:3px solid rgba(91,141,239,.6);outline-offset:2px;border-radius:4px;}

.container{max-width:var(--container);margin:0 auto;padding:0 clamp(20px,5vw,24px);}
section{position:relative;padding:var(--section-y) 0;}

h1{font-size:var(--font-h1);font-weight:800;line-height:1.15;letter-spacing:-0.03em;}
h2{font-size:var(--font-h2);font-weight:700;line-height:1.2;letter-spacing:-0.02em;}
h3{font-size:var(--font-h3);font-weight:700;line-height:1.3;letter-spacing:-0.02em;}
.sub{color:var(--ink-600);max-width:42em;}
.caption{font-size:var(--font-caption);font-weight:500;line-height:1.5;letter-spacing:0;color:var(--ink-400);}
.eyebrow{font-size:13px;font-weight:600;line-height:1;letter-spacing:0.06em;color:var(--blue-600);display:inline-block;margin-bottom:var(--space-4);}
.grad-text{background:var(--grad-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
.em-text{color:var(--blue-600);}
.center{text-align:center;}
.center .sub{margin-left:auto;margin-right:auto;}

/* ═══════════════ 글래스 ═══════════════ */
.glass{
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(var(--blur-card)) saturate(1.4);
  -webkit-backdrop-filter:blur(var(--blur-card)) saturate(1.4);
  border:1px solid rgba(255,255,255,0.7);
  border-radius:var(--r-md);
  box-shadow:var(--shadow-md),inset 0 1px 0 rgba(255,255,255,0.6);
}
.glass-chip{
  background:rgba(255,255,255,0.5);
  backdrop-filter:blur(var(--blur-chip)) saturate(1.3);
  -webkit-backdrop-filter:blur(var(--blur-chip)) saturate(1.3);
  border:1px solid rgba(255,255,255,0.7);
  border-radius:var(--r-pill);
  box-shadow:var(--shadow-sm);
}
.glass-panel{
  background:rgba(255,255,255,0.62);
  backdrop-filter:blur(var(--blur-panel)) saturate(1.4);
  -webkit-backdrop-filter:blur(var(--blur-panel)) saturate(1.4);
  border:1px solid rgba(255,255,255,0.75);
  border-radius:var(--r-lg);
  box-shadow:var(--shadow-lg),inset 0 1px 0 rgba(255,255,255,0.6);
}
@supports not (backdrop-filter:blur(1px)){
  .glass,.glass-chip,.glass-panel{background:rgba(255,255,255,0.85);}
}
.card-hover{transition:transform .3s ease,box-shadow .3s ease;}
.card-hover:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg),inset 0 1px 0 rgba(255,255,255,0.6);}

/* ═══════════════ 구름 & 오브 ═══════════════ */
.sky-layer{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.cloud{
  position:absolute;border-radius:50%;
  background:radial-gradient(closest-side,rgba(255,255,255,0.95),rgba(255,255,255,0) 70%);
  filter:blur(12px);
  animation:cloudFloat 30s ease-in-out infinite alternate;
}
.cloud::before,.cloud::after{
  content:'';position:absolute;border-radius:50%;
  background:radial-gradient(closest-side,rgba(255,255,255,0.9),rgba(255,255,255,0) 70%);
}
.cloud::before{width:70%;height:70%;left:-25%;top:22%;}
.cloud::after{width:60%;height:60%;right:-20%;top:30%;}
.cloud.faint{opacity:.3;filter:blur(16px);}
@keyframes cloudFloat{from{transform:translateX(0);}to{transform:translateX(18px);}}
.orb{position:absolute;border-radius:50%;filter:blur(50px);opacity:.5;animation:cloudFloat 38s ease-in-out infinite alternate-reverse;}

/* ═══════════════ 버튼 · 입력칸 · 칩 ═══════════════ */
.btn-primary{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:var(--blue-500);color:#fff;
  font-size:16px;font-weight:700;letter-spacing:-0.01em;
  border-radius:var(--r-pill);padding:16px 28px;min-height:var(--cta-h);
  box-shadow:var(--shadow-md);
  transition:transform .2s ease,box-shadow .2s ease,background .2s ease;
  white-space:nowrap;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);background:var(--blue-600);}
.btn-primary:active{transform:translateY(0);box-shadow:var(--shadow-sm);}
.btn-primary.hero-cta{font-size:17px;padding:18px 40px;min-height:58px;}
.link-plain{color:var(--blue-600);font-weight:600;font-size:15px;border-bottom:1px solid transparent;transition:border-color .2s;}
.link-plain:hover{border-bottom-color:var(--blue-600);}

.email-form{display:flex;gap:var(--space-3);width:100%;max-width:520px;}
.email-form input[type="email"]{
  flex:1;min-width:0;height:var(--cta-h);
  background:#fff;border:1px solid var(--input-border);border-radius:var(--r-pill);
  padding:0 20px;font-size:16px;color:var(--ink-900);
  transition:border-color .2s,box-shadow .2s;
}
.email-form input[type="email"]::placeholder{color:var(--ink-400);}
.email-form input[type="email"]:focus{
  outline:none;border-color:var(--blue-500);
  box-shadow:0 0 0 3px rgba(125,167,244,.25);
}
.form-error{display:none;color:#D9534F;font-size:13px;font-weight:500;margin-top:var(--space-2);}
.form-wrap.invalid .form-error{display:block;}
.micro{font-size:var(--font-caption);color:var(--ink-400);margin-top:var(--space-3);line-height:1.5;}
@media (max-width:767px){
  .email-form{flex-direction:column;}
  .email-form .btn-primary{width:100%;}
}

/* ═══════════════ 내비게이션 ═══════════════ */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:80;height:64px;
  transition:background .3s,box-shadow .3s,border-color .3s;
  border-bottom:1px solid transparent;
}
.nav.scrolled{
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(var(--blur-chip)) saturate(1.3);
  -webkit-backdrop-filter:blur(var(--blur-chip)) saturate(1.3);
  border-bottom-color:rgba(125,167,244,.18);
}
.nav-inner{max-width:var(--container);margin:0 auto;height:64px;padding:0 clamp(20px,5vw,24px);display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);}
.nav-menu{display:flex;gap:var(--space-8);align-items:center;}
.nav-menu a{font-size:15px;font-weight:500;color:var(--ink-600);transition:color .2s;}
.nav-menu a:hover{color:var(--ink-900);}
.nav .btn-primary{padding:10px 20px;min-height:40px;font-size:14px;}
@media (max-width:767px){.nav-menu{display:none;}}

.logo{display:inline-flex;align-items:center;gap:8px;font-size:20px;font-weight:700;color:var(--ink-900);letter-spacing:-0.02em;}
.logo svg{width:22px;height:22px;}

/* ═══════════════ Hero ═══════════════ */
.hero{
  background:var(--grad-sky);
  padding-top:calc(64px + var(--space-16));
  padding-bottom:0;overflow:hidden;
}
.hero-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;font-weight:600;color:var(--ink-900);border:1px solid rgba(255,216,77,.55);margin-bottom:var(--space-6);}
.hero h1{margin-bottom:var(--space-6);white-space:pre-line;}
.hero .sub{margin-bottom:var(--space-8);white-space:pre-line;}
.hero-slogan{font-size:14px;font-weight:600;color:var(--blue-600);margin-bottom:var(--space-3);letter-spacing:0.02em;}
.hero-form-wrap{width:100%;display:flex;flex-direction:column;align-items:center;}
.hero .browse{margin-top:var(--space-6);}
.hero-mockup{position:relative;z-index:2;margin:var(--space-16) auto calc(-1 * var(--space-8));max-width:760px;width:100%;}
@media (max-width:767px){.hero-mockup{margin-top:var(--space-12);}}

/* ═══════════════ 목업 공통 (CSS 스켈레톤 UI) ═══════════════ */
.mock-frame{border-radius:var(--r-lg);padding:var(--space-3);}
.mock-bar{display:flex;gap:6px;padding:6px 6px 12px;}
.mock-bar i{width:10px;height:10px;border-radius:50%;display:block;}
.mock-bar i:nth-child(1){background:#FF8A80;}
.mock-bar i:nth-child(2){background:var(--lemon-500);}
.mock-bar i:nth-child(3){background:var(--green-500);}
.mock-body{background:#fff;border-radius:var(--r-sm);padding:var(--space-4);text-align:left;box-shadow:inset 0 0 0 1px rgba(226,233,244,.8);}
.sk{background:#EDF2FA;border-radius:6px;height:10px;}
.sk.w40{width:40%;}.sk.w60{width:60%;}.sk.w80{width:80%;}
.mock-row{display:flex;align-items:center;gap:var(--space-3);padding:10px 12px;border-radius:10px;}
.mock-row + .mock-row{margin-top:6px;}
.mock-row.hot{background:rgba(255,226,122,.28);box-shadow:inset 0 0 0 1px rgba(255,216,77,.5);}
.mock-label{font-size:12.5px;font-weight:600;color:var(--ink-900);white-space:nowrap;}
.mock-sub{font-size:11.5px;color:var(--ink-400);white-space:nowrap;}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;border-radius:var(--r-pill);padding:3px 10px;white-space:nowrap;}
.chip.blue{background:var(--blue-100);color:#3B66C4;}
.chip.mint{background:var(--mint-200);color:#177A58;}
.chip.lemon{background:var(--lemon-400);color:#7A6410;}
.chip.gray{background:#EDF2FA;color:var(--ink-600);}
.dday{flex:none;white-space:nowrap;font-size:11px;font-weight:700;border-radius:var(--r-pill);padding:3px 9px;background:var(--blue-100);color:#3B66C4;}
.dday.urgent{background:var(--lemon-400);color:#7A6410;}

/* ═══════════════ Section 2 · 공감 ═══════════════ */
.sec-problem{background:var(--bg-white);}
.problem-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-6);margin-top:var(--space-12);}
.problem-card{padding:var(--space-8);}
.problem-card h3{margin-bottom:var(--space-3);}
.problem-card p{color:var(--ink-600);font-size:15.5px;}
.problem-closing{margin-top:var(--space-16);text-align:center;font-size:clamp(19px,2.4vw,24px);font-weight:700;line-height:1.5;white-space:pre-line;color:var(--ink-900);}
@media (max-width:767px){.problem-grid{grid-template-columns:1fr;}}

/* ═══════════════ Section 3 · 솔루션 ═══════════════ */
.sec-solution{background:var(--grad-solution);overflow:hidden;}
.demo-flow{margin-top:var(--space-12);position:relative;z-index:2;}
.demo-exp-chip{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;font-size:14px;font-weight:600;color:var(--ink-900);}
/* Before 카드 — 업로드한 경험 메모 파일 느낌 */
.demo-before{max-width:620px;margin:0 auto;padding:var(--space-3);text-align:left;background:rgba(255,255,255,0.42);border-style:dashed;border-color:rgba(147,161,181,.55);}
/* BEFORE / AFTER 라벨 — 동일한 알약 버튼 모양 (중앙 정렬) */
.demo-label-row{text-align:center;margin-bottom:var(--space-4);}
.demo-pill{display:inline-flex;align-items:center;font-size:13px;font-weight:800;letter-spacing:.04em;border-radius:var(--r-pill);padding:8px 20px;}
.demo-pill.before{background:rgba(255,255,255,0.72);border:1px solid rgba(147,161,181,.28);color:var(--ink-400);}
.demo-pill.after{background:var(--blue-500);color:#fff;box-shadow:var(--shadow-sm);}
.memo{background:#fff;border:1px solid var(--input-border);border-radius:var(--r-sm);padding:var(--space-4) var(--space-6);box-shadow:var(--shadow-sm);}
.memo-head{display:flex;align-items:center;gap:8px;margin-bottom:var(--space-4);}
.memo-ic{flex:none;width:22px;height:22px;}
.memo-ic svg{width:22px;height:22px;}
.memo-name{font-size:13.5px;font-weight:700;color:var(--ink-600);}
.memo-uploaded{margin-left:auto;display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;color:#157150;background:var(--mint-200);border-radius:var(--r-pill);padding:4px 11px;white-space:nowrap;}
.memo-uploaded svg{width:13px;height:13px;}
.memo-title{font-size:14.5px;font-weight:700;color:var(--ink-900);margin-bottom:6px;}
.memo-body{color:var(--ink-600);font-size:15px;line-height:1.75;}
/* Before → After 화살표 구분자 */
.demo-divider{display:flex;flex-direction:column;align-items:center;gap:8px;margin:var(--space-6) 0;}
.demo-arrow{font-size:24px;font-weight:800;line-height:1;color:var(--blue-500);animation:arrowBob 2.2s ease-in-out infinite;}
@keyframes arrowBob{0%,100%{transform:translateY(0);}50%{transform:translateY(5px);}}
.demo-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-6);}
.demo-card{padding:var(--space-8);text-align:left;background:rgba(255,255,255,0.82);}
.demo-card .org{display:inline-block;font-size:13px;font-weight:700;color:var(--blue-600);background:var(--blue-100);border-radius:var(--r-pill);padding:5px 14px;margin-bottom:var(--space-4);}
.demo-card.alt .org{color:#177A58;background:var(--mint-200);}
.demo-card p{color:var(--ink-900);font-size:15.5px;line-height:1.9;}
/* 강조 — 배경 없이 글자 굵기·색만 (기관 색상) */
.demo-card mark{background:none;color:#2E5AB8;font-weight:700;}
.demo-card.alt mark{background:none;color:#157150;}
.demo-caption{text-align:center;margin-top:var(--space-6);}
/* 프로세스 — 독립 섹션 (기존 흰 배경 사용) */
.sec-process{background:var(--bg-white);}
.process-head{margin-bottom:var(--space-12);}
.process-title{margin-top:var(--space-3);white-space:pre-line;}
.steps{display:flex;align-items:stretch;justify-content:center;gap:var(--space-3);}
.step{flex:1;padding:var(--space-6);text-align:left;}
.step .num{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:var(--blue-500);color:#fff;font-size:15px;font-weight:700;margin-bottom:var(--space-4);box-shadow:var(--shadow-sm);}
.step h4{font-size:18px;font-weight:700;margin-bottom:var(--space-2);color:var(--ink-900);}
.step p{color:var(--ink-600);font-size:14.5px;}
.step-arrow{flex:none;align-self:center;font-size:24px;font-weight:800;color:var(--blue-300);}
.mid-cta{margin-top:var(--space-16);text-align:center;position:relative;z-index:2;}
@media (max-width:767px){
  .demo-grid{grid-template-columns:1fr;}
  .steps{flex-direction:column;gap:var(--space-2);}
  .step-arrow{transform:rotate(90deg);align-self:center;}
}

/* ═══════════════ Section 4 · 기능 ═══════════════ */
.sec-features{background:var(--bg-tint);}
.feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-6);margin-top:var(--space-12);}
.feature-card{position:relative;padding:var(--space-8) var(--space-6);display:flex;flex-direction:column;gap:var(--space-3);}
.feature-card .flabel{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;letter-spacing:.02em;color:var(--blue-600);}
.feature-card .flabel svg{width:16px;height:16px;flex:none;}
.feature-card h3{white-space:pre-line;margin-bottom:2px;}
.feature-card > p{color:var(--ink-600);font-size:15px;margin-bottom:var(--space-2);}
/* 목업 — 윈도우 프레임(3점 바) */
.feature-screen{margin-top:auto;background:#fff;border:1px solid var(--input-border);border-radius:var(--r-md);box-shadow:var(--shadow-sm);overflow:hidden;}
.mock-topbar{display:flex;gap:5px;padding:9px 13px;background:#FAFCFF;border-bottom:1px solid #EFF3FA;}
.mock-topbar i{width:8px;height:8px;border-radius:50%;}
.mock-topbar i:nth-child(1){background:#FFB4AC;}
.mock-topbar i:nth-child(2){background:#FFE0A3;}
.mock-topbar i:nth-child(3){background:#A8E6CC;}
.feature-mock{padding:var(--space-4);}
.fm-btn{display:inline-block;font-size:11px;font-weight:700;color:#fff;background:var(--blue-500);border-radius:var(--r-pill);padding:5px 12px;}
.fm-title{font-size:12px;font-weight:700;color:var(--ink-900);margin-bottom:8px;}
.fm-panel{background:var(--bg-tint);border-radius:8px;padding:8px;}
.match{font-size:10.5px;font-weight:700;color:#177A58;background:var(--mint-200);border-radius:var(--r-pill);padding:2px 8px;}
.mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px;}

.done-desc{font-size:14.5px;color:var(--ink-600);line-height:1.6;white-space:pre-line;}

const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
// {{...}} → 그라디언트 강조, \n → <br>
// {{...}} = 그라디언트 강조, ==...== = 브랜드 컬러 강조, \n = 줄바꿈
const rich = s => esc(s)
  .replace(/\{\{(.+?)\}\}/g,'<span class="grad-text">$1</span>')
  .replace(/==(.+?)==/g,'<span class="em-text">$1</span>')
  .replace(/\n/g,'<br>');
// ==...== → 강조 하이라이트 (Before/After 데모 자소서용)
const hl = s => esc(s).replace(/==(.+?)==/g,'<mark>$1</mark>');

/* ─────────── 데이터 기록 ─────────── */
const leads = []; // 메모리 기록 (개발 확인용)
const validEmail = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
// 전화번호: 숫자 9~11자리 (하이픈·공백 허용). 예) 010-1234-5678
const validPhone = v => /^\d{9,11}$/.test(v.replace(/[\s-]/g,''));
// 이메일 또는 전화번호 허용
const validContact = v => validEmail(v) || validPhone(v);

async function submitLead(payload) {
  leads.push(payload);
  console.log('[Pickd] 신청/설문 데이터:', payload);
  if (CONFIG.formEndpoint) {
    try {
      // Apps Script는 preflight(OPTIONS) 미지원 → text/plain 단순 요청으로 전송(CORS 회피). 수신부는 JSON.parse로 동일 파싱.
      await fetch(CONFIG.formEndpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload),
      });
    } catch (err) { console.warn('[Pickd] 전송 실패(로컬에는 기록됨):', err); }
  }
}

/* ─────────── 모달: 신청 버튼 → 이메일 입력 → 미니 설문 ─────────── */
const overlay = document.getElementById('surveyOverlay');
const panel = document.getElementById('surveyPanel');
const answers = {};
let currentEmail = '';

function openModal() { overlay.classList.add('open'); document.body.style.overflow = 'hidden'; }

}

/* 1단계: 이메일 입력 */
function openSignup() {
  panel.innerHTML = `
    <button type="button" class="survey-close" aria-label="닫기">✕</button>
    <div class="signup-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M6 9.5a6 6 0 0112 0c0 4.5 2 5.5 2 5.5H4s2-1 2-5.5z" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/><path d="M10 19a2 2 0 004 0" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg></div>
    <p class="signup-title">${esc(COPY.signup.title)}</p>
    <p class="signup-desc">${esc(COPY.signup.desc)}</p>
    <form class="signup-form form-wrap" data-signup novalidate>
      <div class="signup-input">
        <span class="in-ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M6 9.5a6 6 0 0112 0c0 4.5 2 5.5 2 5.5H4s2-1 2-5.5z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M10 19a2 2 0 004 0" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></span>
        <input type="text" id="modalEmail" name="contact" placeholder="${esc(COPY.signup.placeholder)}" autocomplete="email" aria-label="이메일 또는 전화번호" required>
      </div>
      <p class="form-error" role="alert">${esc(COPY.survey.invalidEmail)}</p>
      <button type="submit" class="btn-primary">${esc(COPY.signup.submit)}</button>
    </form>
    ${COPY.signup.micro ? `<p class="micro" style="text-align:center;">${esc(COPY.signup.micro)}</p>` : ''}`;
  openModal();
  panel.querySelector('.survey-close').addEventListener('click', closeModal);
  const form = panel.querySelector('[data-signup]');
  form.addEventListener('submit', ev => {
    ev.preventDefault();
    const input = form.querySelector('input[name="contact"]');
    if (!validContact(input.value)) { form.classList.add('invalid'); input.focus(); return; }
    form.classList.remove('invalid');
    currentEmail = input.value.trim();
    const contactType = validEmail(currentEmail) ? 'email' : 'phone';
    submitLead({ type: 'signup', contact: currentEmail, contactType, at: new Date().toISOString() });
    if (CONFIG.showSurvey) renderSurvey();
    else showDone();
  });
  setTimeout(() => panel.querySelector('#modalEmail')?.focus(), 120);
}

/* 2단계: 신청 완료 + 미니 설문 (선택) */
function renderSurvey() {
  answers.wish = '';
  COPY.survey.questions.forEach(q => answers[q.id] = q.multi ? [] : null);
  panel.innerHTML = `
    <button type="button" class="survey-close" aria-label="닫기">✕</button>
    <p class="survey-title">${esc(COPY.survey.successTitle)}</p>
    ${COPY.survey.questions.map(q => `
      <div class="survey-q" data-q="${q.id}" data-multi="${q.multi ? '1' : ''}">
        <p class="q">${esc(q.q)}</p>
        <div class="chip-opts">${q.options.map(o=>`<button type="button" class="chip-opt" data-val="${esc(o)}">${esc(o)}</button>`).join('')}</div>
      </div>`).join('')}
    <div class="survey-q">
      <p class="q">${esc(COPY.survey.freeQ.q)}</p>
      <input type="text" id="surveyWish" placeholder="${esc(COPY.survey.freeQ.placeholder)}" maxlength="120">
    </div>
    <button type="button" class="btn-primary" id="surveySubmit">${esc(COPY.survey.submit)}</button>`;

  panel.querySelector('.survey-close').addEventListener('click', closeModal);
  panel.querySelectorAll('.survey-q[data-q]').forEach(qEl => {
    const id = qEl.dataset.q;
    const isMulti = qEl.dataset.multi === '1';
    qEl.querySelectorAll('.chip-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        if (isMulti) {
          btn.classList.toggle('on');
          const arr = answers[id];
          const i = arr.indexOf(btn.dataset.val);
          if (i === -1) arr.push(btn.dataset.val); else arr.splice(i, 1);
        } else {
          qEl.querySelectorAll('.chip-opt').forEach(b => b.classList.remove('on'));
          btn.classList.add('on');
          answers[id] = btn.dataset.val;
        }
      });
    });
  });
  panel.querySelector('#surveySubmit').addEventListener('click', () => {
    const wishEl = panel.querySelector('#surveyWish');
    answers.wish = wishEl ? wishEl.value.trim() : '';
    submitLead({ type: 'survey', contact: currentEmail, ...answers, at: new Date().toISOString() });
    showDone();
  });
}
const closeSurvey = closeModal; // 하위 호환
overlay.addEventListener('click', e => { if (e.target === overlay) closeSurvey(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && overlay.classList.contains('open')) closeSurvey(); });

/* ─────────── 스크롤 진입 모션 (IntersectionObserver + 80ms 스태거) ─────────── */
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (reduceMotion) {
  document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
} else {
  const io = new IntersectionObserver(entries => {
    entries.forEach(en => {
      if (!en.isIntersecting) return;
      const siblings = [...en.target.parentElement.querySelectorAll(':scope > .reveal:not(.in)')];
      const idx = Math.max(0, siblings.indexOf(en.target));
      setTimeout(() => en.target.classList.add('in'), Math.min(idx, 5) * 80);
      io.unobserve(en.target);
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));
}
</script>
